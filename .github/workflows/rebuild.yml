name: Rebuild Solution Data

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'data.json'
      - 'PORTFOLIO_README.md'
      - '.github/workflows/**'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write

jobs:
  rebuild-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Fetch all history so git diff and push work correctly
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Data Generation Script
        run: |
          node generate_data.js

      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add data.json
          
          # Only commit and push if data.json was actually modified
          if git diff --cached --quiet; then
            echo "No changes detected in data.json. Skipping commit."
          else
            git commit -m "chore: auto-update data.json"
            git push origin main
          fi
